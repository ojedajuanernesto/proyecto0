[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_version = "20"
  included_files = ["src/data/knowledge/**"]

# Configuración para evitar errores con API routes en Next.js 14 en Netlify
[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"
