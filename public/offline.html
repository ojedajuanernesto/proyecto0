<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Mantenimiento - Instituto Sur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B3A6B;
            --secondary: #D92027;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(27, 58, 107, 0.1);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        .logo span {
            color: var(--secondary);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(27, 58, 107, 0.1);
            border-top: 5px solid var(--secondary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #ffe4e6;
            color: var(--secondary);
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Instituto<span>Sur</span></div>
        <div class="spinner"></div>
        <span class="badge">Fuera de Servicio Temporalmente</span>
        <h1>Estamos realizando mejoras</h1>
        <p>Nuestro sitio web no es accesible en este momento debido a tareas de mantenimiento programadas. Volveremos a estar disponibles muy pronto.</p>
        <div style="font-size: 0.9rem; color: #94a3b8;">&copy; 2026 Instituto Sur. Todos los derechos reservados.</div>
    </div>
</body>
</html>
